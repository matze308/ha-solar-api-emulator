name: Fronius Solar API Emulator
version: "1.0.2"
slug: fronius_solar_api_emulator
description: Simuliert die Fronius Solar API V1 mit Wechselrichter, Batteriespeicher und Smart Meter basierend auf Home Assistant Sensordaten.
url: https://github.com/matze308/ha-solar-api-emulator
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
map:
  - config:rw
options:
  port: 8088
  log_level: info
schema:
  port: int
  log_level: list(debug|info|warning|error)
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: Fronius Solar API HTTP Port
init: false
hassio_api: true
homeassistant_api: true
hassio_role: default
auth_api: false
ingress: false
panel_icon: mdi:solar-power
