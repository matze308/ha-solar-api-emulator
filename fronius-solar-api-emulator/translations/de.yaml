configuration:
  port:
    name: Port
    description: TCP-Port, auf dem der Fronius Solar API Emulator lauscht.
  log_level:
    name: Log-Level
    description: Detailgrad der Add-on-Protokollausgabe.
  sensor_pv:
    name: PV-Leistungssensor
    description: Home-Assistant-Sensor-Entität für die PV-Erzeugungsleistung (W).
  sensor_power:
    name: Verbrauchsleistungssensor
    description: Home-Assistant-Sensor-Entität für den Hausverbrauch (W).
  sensor_grid:
    name: Netzleistungssensor
    description: Home-Assistant-Sensor-Entität für die Netzleistung (positiv = Bezug, negativ = Einspeisung) (W).
  sensor_soc:
    name: Batterie-SOC-Sensor
    description: Home-Assistant-Sensor-Entität für den Batterieladezustand (%).
  sensor_battery:
    name: Batterieleistungssensor
    description: Home-Assistant-Sensor-Entität für die Batterieleistung (positiv = Laden, negativ = Entladen) (W).
  sensor_production_today:
    name: Heutige-Erzeugung-Sensor
    description: Home-Assistant-Sensor-Entität für die heutige PV-Energieerzeugung (Wh).
